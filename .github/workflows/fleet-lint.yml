name: fleet-lint

# Reusable workflow: cross-repo consistency gate via the shared `Mcp.FleetLint` dotnet tool.
# Consumers call this from their own .github/workflows/fleet-lint.yml with:
#
#   uses: Platonenkov/mcp-tooling/.github/workflows/fleet-lint.yml@main
#
# Validates that the calling repo's OAuth scope, /mcp endpoint hostname, OAuth callback port,
# and authorization-server URL match the canonical fleet inventory at
# https://raw.githubusercontent.com/Platonenkov/mcp-tooling/main/fleet-lint.json
#
# Repos NOT in the inventory (mcp-tooling, mcp-auth, or any third party using the tool) get a
# clean pass — every check is a no-op.

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'dotnet SDK version to use.'
        type: string
        default: '10.0.x'

permissions:
  contents: read

jobs:
  fleetlint:
    name: fleet consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '.config/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Run mcp-fleetlint
        run: dotnet tool run mcp-fleetlint --check
