name: docs-i18n

# Self-check: this repo IS the source of Mcp.I18nCheck, so run it from local build
# (no dependency on the published package).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bilingual-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet run --project src/Mcp.I18nCheck/Mcp.I18nCheck.csproj -c Release
