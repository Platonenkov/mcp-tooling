name: publish

# Publishes all dotnet tools in this repo (Mcp.ToolsDoc, Mcp.I18nCheck, Mcp.LinkCheck,
# Mcp.FleetLint, Mcp.SkillLint) to nuget.org when a v* tag is pushed. Per-tool version lives
# in its csproj <Version>; unchanged packages pass through --skip-duplicate (idempotent
# re-runs are safe).
# Tag the repo with v<X>.<Y>.<Z> to publish, e.g.:
#   git tag v0.4.0 && git push origin v0.4.0
# Requires the repo secret NUGET_API_KEY (a nuget.org API key with push rights).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: |
          dotnet pack src/Mcp.ToolsDoc/Mcp.ToolsDoc.csproj   -c Release -o ./nupkg
          dotnet pack src/Mcp.I18nCheck/Mcp.I18nCheck.csproj -c Release -o ./nupkg
          dotnet pack src/Mcp.LinkCheck/Mcp.LinkCheck.csproj -c Release -o ./nupkg
          dotnet pack src/Mcp.FleetLint/Mcp.FleetLint.csproj -c Release -o ./nupkg
          dotnet pack src/Mcp.SkillLint/Mcp.SkillLint.csproj -c Release -o ./nupkg

      - name: Push to nuget.org
        run: >
          dotnet nuget push "./nupkg/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --skip-duplicate
